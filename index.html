<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Registration Form - AgriStack</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input[type="text"],
        input[type="number"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: #2e7d32;
            outline: none;
        }
        fieldset {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
        }
        legend {
            font-weight: bold;
            color: #2e7d32;
            padding: 0 10px;
        }
        button {
            width: 100%;
            background-color: #2e7d32;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Farmer Registration Portal</h2>
    <form action="#" method="POST">
        
        <!-- Personal Information -->
        <fieldset>
            <legend>Personal Details</legend>
            <div class="form-row">
                <div class="form-group">
                    <label for="fullName">Full Name (as per Aadhaar)*:</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="guardianName">Father's/Husband's Name*:</label>
                    <input type="text" id="guardianName" name="guardianName" required placeholder="Enter guardian name">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dob">Date of Birth*:</label>
                    <input type="date" id="dob" name="dob" style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender*:</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="transgender">Transgender</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="mobile">Mobile Number (Linked to Aadhaar)*:</label>
                    <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" required placeholder="10-digit mobile number">
                </div>
                <div class="form-group">
                    <label for="aadhaar">Aadhaar Number*:</label>
                    <input type="text" id="aadhaar" name="aadhaar" pattern="[0-9]{12}" required placeholder="12-digit Aadhaar number">
                </div>
            </div>
        </fieldset>

        <!-- Farm and Land Details -->
        <fieldset>
            <legend>Land and Farming Details</legend>
            <div class="form-row">
                <div class="form-group">
                    <label for="landSize">Total Land Holding (in Acres)*:</label>
                    <input type="number" id="landSize" name="landSize" step="0.01" required placeholder="e.g., 5.5">
                </div>
                <div class="form-group">
                    <label for="soilType">Primary Soil Type:</label>
                    <select id="soilType" name="soilType">
                        <option value="">Select Soil Type</option>
                        <option value="alluvial">Alluvial</option>
                        <option value="black">Black / Regur</option>
                        <option value="red">Red</option>
                        <option value="laterite">Laterite</option>
                        <option value="loamy">Loamy</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="mainCrops">Main Crops Grown*:</label>
                <input type="text" id="mainCrops" name="mainCrops" required placeholder="e.g., Rice, Wheat, Cotton">
            </div>
        </fieldset>

        <!-- Location Details -->
        <fieldset>
            <legend>Address Details</legend>
            <div class="form-row">
                <div class="form-group">
                    <label for="district">District*:</label>
                    <input type="text" id="district" name="district" required placeholder="Enter district">
                </div>
                <div class="form-group">
                    <label for="mandal">Mandal / Block*:</label>
                    <input type="text" id="mandal" name="mandal" required placeholder="Enter mandal">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="village">Village*:</label>
                    <input type="text" id="village" name="village" required placeholder="Enter village">
                </div>
                <div class="form-group">
                    <label for="pincode">Pin Code*:</label>
                    <input type="text" id="pincode" name="pincode" pattern="[0-9]{6}" required placeholder="6-digit PIN">
                </div>
            </div>
        </fieldset>

        <button type="submit">Submit Registration</button>
    </form>
</div>

</body>
</html>
